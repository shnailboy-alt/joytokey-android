apply plugin: 'com.android.application'

android {
    // REQUIRED: new AGP needs namespace explicitly
    namespace "com.example.joytokey"

    compileSdkVersion 34

    defaultConfig {
        applicationId "com.example.joytokey"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
